name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 🔹 Backend Install
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      # 🔹 Frontend Install
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # 🔹 Frontend Build (IMPORTANT)
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # 🔹 Docker Build Check
      - name: Build Docker containers
        run: docker compose build